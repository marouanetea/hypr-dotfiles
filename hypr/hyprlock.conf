general {
    no_fade_in = false
    grace = 0
    disable_loading_bar = false
}

animations {
    enabled = true
	bezier = linear, 1, 1, 0, 0
    animation = fadeIn, 1, 3, linear
    animation = fadeOut, 1, 3, linear
    animation = inputFieldDots, 1, 2, linear
    animation = inputFieldFail, 1, 1, linear
    animation = inputFieldColors, 1, 2, linear
}

#background image
background {
    path =  ~/.config/cache/hyprlock_bg.png
    blur_passes = 2
}

#profile image
image {
    path = ~/.me.jpg
    border_size = 3
    border_color = rgba(255, 255, 255, 0.70)
    size = 150
    rounding = -1
    position = 0, 50
    halign = center
    valign = center
}

#date
label {
    text = cmd[update:1000] echo -e "$(date +"%A, %d %B")"
    color = rgba(255, 255, 255, 0.70)
    font_size = 25
    font_family = Dubai Bold
    position = 0, 350
    halign = center
    valign = center
}

# time
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%I:%M")"
    color = rgba(255, 255, 255, 0.70)
    font_size = 120
    font_family = Dubai Bold
    position = 0, 250
    halign = center
    valign = center
}

# USER-BOX
shape {
    size = 300, 60
    color = rgba(255, 255, 255, .1)
    rounding = -1
    border_size = 0
    border_color = rgba(255, 255, 255, 0)
    rotate = 0
    xray = false

    position = 0, -130
    halign = center
    valign = center
}

# USER
label {
    text = $USER
    color = rgba(255, 255, 255, 0.70)
    outline_thickness = 2
    dots_size = 0.2 
    dots_spacing = 0.2 
    dots_center = true
    font_size = 18
    font_family = Dubai Regular
    position = 0, -130
    halign = center
    valign = center
}

# INPUT FIELD
input-field {
    monitor =
    size = 300, 60
    outline_thickness = 2
    dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.2 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    outer_color = rgba(0, 0, 0, 0)
    inner_color = rgba(255, 255, 255, 0.1)
    font_color = rgba(200, 200, 200,0.70)
    capslock_color = rgba(253, 198, 13, 1.0) # Yellow warning color
    fade_on_empty = false
    font_family = Dubai Regular
    placeholder_text = Enter Pass
    hide_input = false
    position = 0, -210
    halign = center
    valign = center
}

#warning for when caps lock is on
label {
    monitor =
    # Checks system LED file; outputs "CAPS LOCK ON" or remains completely invisible
    text = cmd[update:100] cat /sys/class/leds/input*::capslock/brightness | grep -q "1" && echo "⚠️ CAPS LOCK ON" || echo  ""
    color =  rgba(253, 198, 13, 1.0) # Yellow warning color
    font_size = 14
    font_family = Dubai Regular
    position = 0, -260
    halign = center
    valign = center
}

# CURRENT SONG
label {
    monitor =
    text = cmd[update:1000] echo "$(~/.config/scripts/song_detail.sh)" 
    color = rgba(255, 255, 255, 0.6)
    font_size = 20
    font_family = Dubai Regular
    position = 0, 50
    halign = center
    valign = bottom
}

# Keyboard layout
label {
    monitor =
    text =  ⌨ $LAYOUT
    color = rgba(255, 255, 255, 0.6)
    font_size = 16
    font_family = Dubai Regular
    position = 50, 50
    halign = left
    valign = bottom
}
