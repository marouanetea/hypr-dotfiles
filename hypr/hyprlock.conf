general {
    no_fade_in = false
    grace = 0
    disable_loading_bar = false
}

#background image
background {
    path =  ~/.config/cache/hyprlock_bg.png
    blur_passes = 2
}

#profile image
image {
    path = ~/.me.jpg
    border_size = 3
    border_color = rgba(255, 255, 255, 0.70)
    size = 150
    rounding = -1
    position = 0, 50
    halign = center
    valign = center
}

#date
label {
    text = cmd[update:1000] echo -e "$(date +"%A, %d %B")"
    color = rgba(255, 255, 255, 0.70)
    font_size = 25
    font_family = Noto Sans Arabic Bold
    position = 0, 350
    halign = center
    valign = center
}

# time
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%I:%M")"
    color = rgba(255, 255, 255, 0.70)
    font_size = 120
    font_family = Noto Sans Arabic Bold
    position = 0, 250
    halign = center
    valign = center
}

# USER-BOX
shape {
    size = 300, 60
    color = rgba(255, 255, 255, .1)
    rounding = -1
    border_size = 0
    border_color = rgba(255, 255, 255, 0)
    rotate = 0
    xray = false

    position = 0, -130
    halign = center
    valign = center
}

# USER
label {
    text = $USER
    color = rgba(255, 255, 255, 0.70)
    outline_thickness = 2
    dots_size = 0.2 
    dots_spacing = 0.2 
    dots_center = true
    font_size = 18
    font_family = Noto Sans Arabic
    position = 0, -130
    halign = center
    valign = center
}

# INPUT FIELD
input-field {
    monitor =
    size = 300, 60
    outline_thickness = 2
    dots_size = 0.2 # Scale of input-field height, 0.2 - 0.8
    dots_spacing = 0.2 # Scale of dots' absolute size, 0.0 - 1.0
    dots_center = true
    outer_color = rgba(0, 0, 0, 0)
    inner_color = rgba(255, 255, 255, 0.1)
    font_color = rgba(200, 200, 200,0.70)
    fade_on_empty = false
    font_family = Noto Sans Arabic Light
    placeholder_text = Enter Pass
    hide_input = false
    position = 0, -210
    halign = center
    valign = center
}

# CURRENT SONG
label {
    monitor =
    text = cmd[update:1000] echo "$(~/.config/scripts/song_detail.sh)" 
    color = rgba(255, 255, 255, 0.6)
    font_size = 20
    font_family = JetBrains Mono Nerd, Noto Sans Arabic
    position = 0, 50
    halign = center
    valign = bottom
}
